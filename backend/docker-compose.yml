version: '3.8'

services:
  student_redis:
    image: redis:latest
    container_name: student_redis
    restart: always
    ports:
      - "6380:6379"  # Dünənki 6379 idi, bunu 6380 edirik ki, toqquşmasın

  student_app:
    build: .
    container_name: student_management_app
    restart: always
    ports:
      - "8050:8050"
    depends_on:
      - student_redis
    environment:
      - SPRING_DATA_REDIS_HOST=student_redis
      - SPRING_DATA_REDIS_PORT=6379